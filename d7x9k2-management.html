    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Admin - Dr. Devesh</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
        }

        .admin-container {
            max-width: 800px;
            margin: 100px auto;
            padding: 2rem;
            background: #1e1e1e;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        .admin-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .admin-header h1 {
            font-family: var(--font-serif);
            color: #fff;
        }

        #login-section {
            max-width: 400px;
            margin: 0 auto;
        }

        .login-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 1rem;
            background: #2c2c2c;
            color: #fff;
            border: 1px solid #444;
            border-radius: 6px;
            font-family: var(--font-sans);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #d4af37; /* Gold accent */
            color: #121212;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .login-btn:hover {
            background: #b5952f;
        }

        #dashboard-section {
            display: none;
        }

        .admin-review-card {
            background: #2c2c2c;
            color: #e0e0e0;
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #333;
        }

        .admin-review-content {
            flex: 1;
            margin-right: 1rem;
        }

        .delete-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
        }

        .delete-btn:hover {
            background: #c0392b;
        }

        .logout-btn {
            display: inline-block;
            margin-top: 2rem;
            background: transparent;
            color: #d4af37;
            border: 1px solid #d4af37;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .logout-btn:hover {
            background: rgba(212, 175, 55, 0.1);
        }
    </style>
</head>
<body>

    <!-- NAVBAR (Simplified) -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Dr. Devesh</a>
        </div>
    </nav>

    <div class="admin-container">
        <div class="admin-header">
            <h1>Admin Dashboard</h1>
            <p>Manage reviews, purchases, and book settings.</p>
        </div>

        <!-- LOGIN SECTION -->
        <div id="login-section">
            <form id="login-form">
                <input type="text" id="admin-username" class="login-input" placeholder="Username" required>
                <input type="password" id="admin-password" class="login-input" placeholder="Password" required>
                <button type="submit" class="login-btn">Login</button>
            </form>
            <p id="login-error" style="color: red; margin-top: 1rem; display: none; text-align: center;"></p>
        </div>

        <!-- DASHBOARD SECTION -->
        <div id="dashboard-section">
            <!-- TAB BUTTONS -->
            <div style="display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap;">
                <button id="tab-reviews" class="login-btn" style="flex:1;">Reviews</button>
                <button id="tab-purchases" class="logout-btn" style="flex:1; margin-top:0;">Purchases</button>
                <button id="tab-settings" class="logout-btn" style="flex:1; margin-top:0;">⚙ Settings</button>
            </div>

            <!-- REVIEWS TAB -->
            <div id="reviews-view">
                <input type="text" id="search-reviews" class="login-input" placeholder="Search comments by name..." style="margin-bottom: 2rem;">
                <div id="admin-reviews-list">
                    <p>Loading reviews...</p>
                </div>
            </div>

            <!-- PURCHASES TAB -->
            <div id="purchases-view" style="display: none;">
                <div id="admin-purchases-list">
                    <p>Loading purchases...</p>
                </div>
            </div>

            <!-- SETTINGS TAB -->
            <div id="settings-view" style="display: none;">
                <h3 style="color:#D4AF37; margin-bottom:1.5rem;">Book Price Settings</h3>
                <div style="background:#2c2c2c; padding:2rem; border-radius:8px; border:1px solid #444;">
                    <label style="display:block; color:#aaa; font-size:13px; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px;">Book Price (₹)</label>
                    <div style="display:flex; gap:1rem; align-items:center;">
                        <input type="number" id="price-input" class="login-input"
                               placeholder="299" min="1" max="99999"
                               style="margin-bottom:0; flex:1; font-size:1.5rem; font-weight:bold;">
                        <button id="save-price-btn" class="login-btn" style="width:auto; padding:12px 24px;">Save Price</button>
                    </div>
                    <p id="price-status" style="margin-top:1rem; font-size:14px;"></p>
                    <p style="color:#666; font-size:12px; margin-top:1rem;">
                        ℹ️ This price is used live on Razorpay checkout. Change here and it takes effect immediately — no code changes needed.
                    </p>
                </div>
            </div>
            
            <button id="logout-btn" class="logout-btn">Log Out</button>
        </div>
    </div>

    <!-- Supabase and Admin JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="admin.js?v=3"></script>
</body>
</html>
